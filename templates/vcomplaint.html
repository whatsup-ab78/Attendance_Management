{% load static %}
{% block content %}
{% include 'header.html' %}


<style>
  .card-registration {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.4);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    border-radius: 20px !important;
  }
  .card-registration:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
  }
  .form-control {
    background: rgba(245, 247, 250, 0.9);
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 12px 15px;
    transition: all 0.3s ease;
    color: #2d3748 !important;
  }
  .form-control:focus {
    background: #ffffff;
    border-color: #667eea;
    box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
    transform: translateY(-2px);
  }
  .form-label {
    color: #4a5568 !important; 
    font-weight: 600;
    font-size: 0.9rem;
    margin-bottom: 6px;
  }
  .btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    border-radius: 30px;
    padding: 12px 40px;
    font-weight: 700;
    letter-spacing: 1px;
    transition: all 0.3s ease;
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
    box-shadow: 0 8px 20px rgba(118, 75, 162, 0.4);
    transform: translateY(-3px);
  }
  .gradient-custom {
    position: relative;
    background-color: transparent !important;
  }
  .text-dark-custom {
    color: #1a202c !important;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
</style>

<section class="vh-100 gradient-custom">
    <div class="container py-5 h-100">
      <div class="row justify-content-center align-items-center h-100">
        <div class="col-12 col-lg-9 col-xl-8">
          <div class="card card-registration shadow-2-strong">
            <div class="card-body p-4 p-md-5">
              <h3 class="mb-4 pb-2 pb-md-0 mb-md-4 text-center text-dark-custom">COMPLAINT</h3>
              <form method="POST" action ="addcomplaint">
              {% csrf_token %}
                <div class="row">
                  <div class="col-md-12">
  
                   <div class="mt-4 pt-2">
                  <a href="hodd" class="btn btn-primary btn-lg"  style="width:145px;">HOD</a>
                </div>
			
				 <div class="mt-4 pt-2">
                  <a href="staff" class="btn btn-primary btn-lg" style="width:145px;">TEACHER</a>
                </div>
  
                  </div>
                 
                </div>

                    <label class="form-label select-label">Choose option</label>
  
                  </div>

  </section>
