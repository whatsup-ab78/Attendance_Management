{% load static %}
{% block content %}
{% include 'header.html' %}


<section class="vh-100 gradient-custom">
    <div class="container py-5 h-100">
      <div class="row justify-content-center align-items-center h-100">
        <div class="col-12 col-lg-9 col-xl-7">
          <div class="card shadow-2-strong card-registration" style="border-radius: 15px;">
            <div class="card-body p-4 p-md-5">
              <h3 class="mb-4 pb-2 pb-md-0 mb-md-5"> ADD PRINCIPAL</h3>
              <form method="POST" action ="addprincy">
              {% csrf_token %}
                <div class="row">
                  <div class="col-md-6 mb-4">
  
                    <div class="form-outline">
                      <input type="text" id="name" class="form-control form-control-lg" name="name" required />
                      <label class="form-label" for="name"> Name</label>
                    </div>
  <div class="form-outline">
                      <input type="text" id="phone" class="form-control form-control-lg" name="phone" required/>
                      <label class="form-label" for="phone"> phone</label>
                    </div>
                  </div>
                 
                </div>
  
                <div class="row">
                                 
                  <div class="col-md-6 mb-4 pb-2">
                    <div class="form-outline">
                      <input type="text" id="email" class="form-control form-control-lg" name="email" required />
                      <label class="form-label" for="name"> Email</label>
                    </div>
				
                    <div class="form-outline">
                      <input type="text" id="password" class="form-control form-control-lg" name="password" required
                      pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[@$!%*?&]).{8,}"
                      title="Password must be at least 8 characters long and include uppercase, lowercase, number, and special character"/>
                      <label class="form-label" for="submit" >password</label>
   
                  </div>
                </div>
  </div>
               <!---- <div class="row">
                  <div class="col-12">
  
                    <select class="select form-control-lg">
                      <option value="1" disabled>Choose option</option>
                      <option value="2">Subject 1</option>
                      <option value="3">Subject 2</option>
                      <option value="4">Subject 3</option>
                    </select>
                    <label class="form-label select-label">Choose option</label>
  
                  </div>
                </div>-->
  
                <div class="mt-4 pt-2">
                  <input class="btn btn-primary btn-lg" type="submit" value="submit"  name="submit"/>
                </div>
  
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  {% endblock %}
  {% include 'footer.html' %}
