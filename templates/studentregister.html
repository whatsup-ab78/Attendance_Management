{% load static %}
{% block content %}
{% include 'header.html' %}


<section class="vh-100 gradient-custom">
  <div class="container py-5 h-100">
    <div class="row justify-content-center align-items-center h-100">
      <div class="col-12 col-lg-9 col-xl-7">
        <div class="card shadow-2-strong card-registration" style="border-radius: 15px;">
          <div class="card-body p-4 p-md-5">
            <h3 class="mb-4 pb-2 pb-md-0 mb-md-5">Registration Form</h3>
            <form method="POST" action="regstudent">
              {% csrf_token %}
              <div class="row">

                <div class="col-md-6 mb-4">

                  <div class="form-outline">
                    <input type="text" id="lastName" class="form-control form-control-lg" name="st_name" />
                    <label class="form-label" for="lastName">Name</label>
                  </div>

                </div>
                <div class="col-md-6 mb-4 pb-2">

                  <div class="form-outline">
                    <input type="email" id="emailAddress" class="form-control form-control-lg" name="st_email"
                      required />
                    <label class="form-label" for="emailAddress">email</label>
                  </div>

                </div>
              </div>



              <div class="row">

                <div class="col-md-12 mb-4 pb-2">

                  <div class="form-outline">
                    <input type="text" id="phoneNumber" class="form-control form-control-lg" name="st_department"
                      required />
                    <label class="form-label" for="phoneNumber">Department</label>
                  </div>
                  <div class="form-outline">
                    <input type="text" id="phoneNumber" class="form-control form-control-lg" name="st_semester"
                      required />
                    <label class="form-label" for="phoneNumber">Semester</label>
                  </div>

                </div>

                <div class="col-md-6 mb-4 pb-2">

                  <div class="form-outline">
                    <input type="tel" id="phoneNumber" class="form-control form-control-lg" name="st_phone" required />
                    <label class="form-label" for="phoneNumber">PhoneNumber</label>
                  </div>

                </div>
                <div class="col-md-6 mb-4 pb-2">

                  <div class="form-outline">
                    <input type="text" id="phoneNumber" class="form-control form-control-lg" name="fathername"
                      required />
                    <label class="form-label" for="phoneNumber">Father's Name</label>
                  </div>

                </div>
                <div class="col-md-6 mb-4 pb-2">

                  <div class="form-outline">
                    <input type="email" id="parentEmail" class="form-control form-control-lg" name="parent_email"
                      required />
                    <label class="form-label" for="parentEmail">Parent's Email</label>
                  </div>

                </div>
                <div class="col-md-6 mb-4 pb-2">

                  <div class="form-outline">
                    <input type="tel" id="phoneNumber" class="form-control form-control-lg" name="st_password" required
                      pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[@$!%*?&]).{8,}"
                      title="Password must be at least 8 characters long and include uppercase, lowercase, number, and special character" />
                    <label class="form-label" for="phoneNumber">Password</label>
                  </div>

                </div>

              </div>

              <!---- <div class="row">
                  <div class="col-12">
  
                    <select class="select form-control-lg">
                      <option value="1" disabled>Choose option</option>
                      <option value="2">Subject 1</option>
                      <option value="3">Subject 2</option>
                      <option value="4">Subject 3</option>
                    </select>
                    <label class="form-label select-label">Choose option</label>
  
                  </div>
                </div>-->

              <div class="mt-4 pt-2">
                <input class="btn btn-primary btn-lg" type="submit" value="register" name="submit" />
              </div>

            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<br>
<br>
<br>
<br><br><br><br><br><br><br><br>

{% endblock %}
{% include 'footer.html' %}
