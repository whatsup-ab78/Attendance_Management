{% load static %}
{% block content %}
{% include 'header.html' %}

<section class="min-vh-100 gradient-custom py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10 col-xl-8">
                <div class="card shadow-2-strong card-registration" style="border-radius: 15px;">
                    <div class="card-body p-4 p-md-5">
                        <h3 class="mb-4 pb-2 pb-md-0 mb-md-5 text-center">Student Complaints</h3>

                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="border-0">Student ID</th>
                                        <th class="border-0">Complaint Details</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {% for i in result %}
                                    <tr>
                                        <td class="align-middle"><strong>{{ i.uid }}</strong></td>
                                        <td class="align-middle">{{ i.complaint }}</td>
                                    </tr>
                                    {% empty %}
                                    <tr>
                                        <td colspan="2" class="text-center py-4 text-muted">No complaints found.</td>
                                    </tr>
                                    {% endfor %}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

{% include 'footer.html' %}
{% endblock %}
